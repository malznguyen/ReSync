version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: resync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - resync_backend

  redis:
    image: redis:7-alpine
    container_name: resync-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - resync_backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: resync-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-CHANGE_ME}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    expose:
      - "5672"
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - resync_backend

  mediamtx:
    build:
      context: ./infra/mediamtx
    image: resync-mediamtx:local
    container_name: resync-mediamtx
    restart: unless-stopped
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    expose:
      - "9997"
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:8554"
      - "${MEDIAMTX_HLS_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9997/v3/config/global/get"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - resync_backend

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: resync-ingestion
    restart: unless-stopped
    profiles:
      - ingestion
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      INGESTION_EXPECTED_FPS: ${INGESTION_EXPECTED_FPS:-30}
      INGESTION_FPS_WARNING_THRESHOLD: ${INGESTION_FPS_WARNING_THRESHOLD:-25}
      INGESTION_DROP_WARNING_RATE: ${INGESTION_DROP_WARNING_RATE:-0.05}
      INGESTION_FPS_LOG_INTERVAL_SECONDS: ${INGESTION_FPS_LOG_INTERVAL_SECONDS:-10}
      INGESTION_CAMERA_REFRESH_SECONDS: ${INGESTION_CAMERA_REFRESH_SECONDS:-30}
      INGESTION_WATCHDOG_POLL_SECONDS: ${INGESTION_WATCHDOG_POLL_SECONDS:-1}
      INGESTION_WATCHDOG_INITIAL_BACKOFF_SECONDS: ${INGESTION_WATCHDOG_INITIAL_BACKOFF_SECONDS:-1}
      INGESTION_WATCHDOG_MAX_BACKOFF_SECONDS: ${INGESTION_WATCHDOG_MAX_BACKOFF_SECONDS:-5}
      INGESTION_WATCHDOG_STABLE_SECONDS: ${INGESTION_WATCHDOG_STABLE_SECONDS:-30}
      INGESTION_STREAM_READ_FAILURE_SECONDS: ${INGESTION_STREAM_READ_FAILURE_SECONDS:-5}
      INGESTION_REDIS_SOCKET_TIMEOUT_SECONDS: ${INGESTION_REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      INGESTION_JPEG_QUALITY: ${INGESTION_JPEG_QUALITY:-85}
      INGESTION_GSTREAMER_ENABLED: ${INGESTION_GSTREAMER_ENABLED:-true}
      INGESTION_GSTREAMER_LATENCY_MS: ${INGESTION_GSTREAMER_LATENCY_MS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    networks:
      - resync_backend

  ai_worker:
    build:
      context: .
      dockerfile: services/ai_worker/Dockerfile
    container_name: resync-ai-worker
    restart: unless-stopped
    profiles:
      - ai_worker
    environment:
      CAMERA_ID: ${AI_WORKER_CAMERA_ID:-00000000-0000-0000-0000-000000000101}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-yolov8n-pose.pt}
      OSNET_MODEL_PATH: ${OSNET_MODEL_PATH:-/models/osnet_x0_25_msmt17.pth}
      AI_WORKER_STALE_FRAME_SECONDS: ${AI_WORKER_STALE_FRAME_SECONDS:-2}
      AI_WORKER_POLL_SECONDS: ${AI_WORKER_POLL_SECONDS:-0.03}
      AI_WORKER_FPS_LOG_INTERVAL_SECONDS: ${AI_WORKER_FPS_LOG_INTERVAL_SECONDS:-10}
      AI_WORKER_REDIS_SOCKET_TIMEOUT_SECONDS: ${AI_WORKER_REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      AI_WORKER_YOLO_CONF: ${AI_WORKER_YOLO_CONF:-0.25}
      AI_WORKER_YOLO_IOU: ${AI_WORKER_YOLO_IOU:-0.7}
      AI_WORKER_YOLO_IMGSZ: ${AI_WORKER_YOLO_IMGSZ:-640}
      AI_WORKER_DEVICE: ${AI_WORKER_DEVICE:-}
      REID_ENABLED: ${REID_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - resync_backend

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    container_name: resync-analytics
    restart: unless-stopped
    profiles:
      - analytics
    environment:
      CAMERA_ID: ${ANALYTICS_CAMERA_ID:-00000000-0000-0000-0000-000000000101}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-CHANGE_ME}
      ANALYTICS_POLL_SECONDS: ${ANALYTICS_POLL_SECONDS:-0.1}
      ANALYTICS_REDIS_SOCKET_TIMEOUT_SECONDS: ${ANALYTICS_REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      ANALYTICS_TRACK_MISSING_SECONDS: ${ANALYTICS_TRACK_MISSING_SECONDS:-5}
      ANALYTICS_CLEANUP_INTERVAL_SECONDS: ${ANALYTICS_CLEANUP_INTERVAL_SECONDS:-1}
      ZONE_CACHE_REFRESH_SECONDS: ${ZONE_CACHE_REFRESH_SECONDS:-60}
      SEATED_THRESHOLD_SECONDS: ${SEATED_THRESHOLD_SECONDS:-3.0}
      HAND_RAISE_THRESHOLD_SECONDS: ${HAND_RAISE_THRESHOLD_SECONDS:-1.5}
      HAND_RAISE_COOLDOWN_SECONDS: ${HAND_RAISE_COOLDOWN_SECONDS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - resync_backend

  dispatcher:
    build:
      context: .
      dockerfile: services/dispatcher/Dockerfile
    container_name: resync-dispatcher
    restart: unless-stopped
    profiles:
      - dispatcher
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-CHANGE_ME}
      RABBITMQ_EVENTS_EXCHANGE: ${RABBITMQ_EVENTS_EXCHANGE:-events}
      DISPATCHER_QUEUE_NAME: ${DISPATCHER_QUEUE_NAME:-webhook_dispatch}
      DISPATCHER_ROUTING_KEY: ${DISPATCHER_ROUTING_KEY:-events.#}
      DISPATCHER_DLQ_EXCHANGE: ${DISPATCHER_DLQ_EXCHANGE:-events.dlx}
      DISPATCHER_DLQ_QUEUE_NAME: ${DISPATCHER_DLQ_QUEUE_NAME:-dlq.webhook}
      DISPATCHER_DLQ_ROUTING_KEY: ${DISPATCHER_DLQ_ROUTING_KEY:-dlq.webhook}
      DISPATCHER_HTTP_TIMEOUT_SECONDS: ${DISPATCHER_HTTP_TIMEOUT_SECONDS:-5}
      DISPATCHER_MAX_RETRIES: ${DISPATCHER_MAX_RETRIES:-3}
      DISPATCHER_RETRY_BACKOFF_SECONDS: ${DISPATCHER_RETRY_BACKOFF_SECONDS:-1,2,4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - resync_backend

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: resync-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      API_ADMIN_USERNAME: ${API_ADMIN_USERNAME:-admin}
      API_ADMIN_PASSWORD_HASH: ${API_ADMIN_PASSWORD_HASH:?API_ADMIN_PASSWORD_HASH must be set}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - resync_backend

  dashboard:
    build:
      context: ./dashboard
    container_name: resync-dashboard
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_HLS_BASE_URL: ${NEXT_PUBLIC_HLS_BASE_URL:-http://localhost:8888}
      DASHBOARD_DEV_LOGIN_ENABLED: ${DASHBOARD_DEV_LOGIN_ENABLED:-true}
      DASHBOARD_DEV_USERNAME: ${API_ADMIN_USERNAME:-admin}
      DASHBOARD_DEV_PASSWORD: ${API_ADMIN_PASSWORD:-}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks:
      - resync_backend

  adminer:
    image: adminer:4
    container_name: resync-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "php", "-r", "$$fp = @fsockopen('127.0.0.1', 8080); if (!$$fp) { exit(1); } fclose($$fp);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - resync_backend

  storage_tools:
    image: python:3.11-slim
    profiles:
      - tools
    working_dir: /app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vision_system}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DO_NOT_USE_THIS_IN_PROD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-CHANGE_ME}
      PYTHONPATH: /app
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sh -lc "python -m pip install -r api/requirements.txt && python scripts/health_check.py"
    networks:
      - resync_backend

networks:
  resync_backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
